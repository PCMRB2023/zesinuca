<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Ze Sinuca 3D</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{

background:#050505;
overflow:hidden;

display:flex;
justify-content:center;
align-items:center;

height:100vh;

}

/* Fundo */

body::before{

content:"";

position:absolute;

width:1800px;
height:1800px;

background:
radial-gradient(circle,#00aa55 0%,#005522 30%,transparent 70%);

filter:blur(100px);

animation:girar 25s linear infinite;

opacity:.35;

}

/* Mesa */

.mesa{

width:900px;
height:520px;

background:

linear-gradient(#0f6a2c,#0b4b1d);

border-radius:30px;

border:18px solid #4b2600;

box-shadow:

0 0 80px #00ff88,

inset 0 0 40px rgba(255,255,255,.2);

position:relative;

transform:perspective(1000px)
rotateX(18deg);

}

/* Bolas */

.bola{

position:absolute;

width:60px;
height:60px;

border-radius:50%;

box-shadow:

0 0 20px white;

animation:flutuar 4s ease-in-out infinite;

}

.b1{

background:#FFD700;
left:120px;
top:150px;

}

.b8{

background:black;

left:380px;
top:250px;

}

.b3{

background:red;

left:650px;
top:180px;

}

/* Texto */

.conteudo{

position:absolute;

text-align:center;

color:white;

z-index:999;

}

h1{

font-size:70px;

letter-spacing:5px;

text-shadow:

0 0 20px #00ff99;

}

h2{

font-size:30px;

margin-top:20px;

color:#dddddd;

}

p{

margin-top:30px;

font-size:20px;

color:#bbb;

}

/* Barra */

.barra{

margin:auto;

margin-top:40px;

width:500px;

height:18px;

background:#222;

border-radius:20px;

overflow:hidden;

}

.progresso{

height:100%;

width:70%;

background:

linear-gradient(90deg,#00ff99,#00ffcc);

animation:carregar 4s infinite;

}

/* Botão */

button{

margin-top:45px;

padding:18px 45px;

border:none;

background:#00aa66;

color:white;

font-size:22px;

border-radius:12px;

cursor:pointer;

transition:.4s;

}

button:hover{

transform:scale(1.05);

box-shadow:0 0 25px #00ff99;

}

@keyframes carregar{

0%{width:15%;}

100%{width:85%;}

}

@keyframes flutuar{

50%{

transform:translateY(-15px);

}

}

@keyframes girar{

100%{

transform:rotate(360deg);

}

}

</style>

</head>

<body>

<div class="conteudo">

<h1>Ze Sinuca 3D</h1>

<h2>EM CONSTRUÇÃO</h2>

<p>

Estamos preparando uma experiência incrível.<br>

Em breve o jogo estará disponível.

</p>

<div class="barra">

<div class="progresso"></div>

</div>

<button>EM BREVE</button>

</div>

<div class="mesa">

<div class="bola b1"></div>

<div class="bola b8"></div>

<div class="bola b3"></div>

</div>

</body>
</html>
